<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HIMA RAIL-CONNECT - Train Booking</title>

<!-- jsPDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
  <h1>🚆 HIMA RAIL-CONNECT</h1>
  <p>Smart & Modern Train Booking System</p>
</header>

<div class="container">

  <!-- AVAILABLE TRAINS MENU -->
  <div class="train-menu">
    <h2>AVAILABLE TRAINS</h2>
    <table id="trainTable">
      <thead>
        <tr>
          <th>Train Name</th>
          <th>From</th>
          <th>To</th>
          <th>Ticket Price (Rs)</th>
          <th>Seats</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- BOOKING FORM -->
  <div class="search-box">
    <input type="text" id="passengerName" placeholder="Passenger Name" />
    <select id="from">
      <option>Visakhapatnam</option>
      <option>Vijayawada</option>
      <option>Tirupati</option>
      <option>Guntur</option>
      <option>Nellore</option>
      <option>Kurnool</option>
    </select>
    <select id="to">
      <option>Vijayawada</option>
      <option>Visakhapatnam</option>
      <option>Tirupati</option>
      <option>Guntur</option>
      <option>Nellore</option>
      <option>Kurnool</option>
    </select>
    <input type="date" id="date" />
    <input type="number" id="passengers" value="1" min="1" max="6" />
    <button onclick="searchTrains()">Search Trains</button>
  </div>

  <!-- SEARCH RESULTS -->
  <div id="trainResults"></div>

</div>

<footer>
  © 2026 HIMA RAIL-CONNECT
</footer>

<script src="script.js"></script>

</body>
</html>
